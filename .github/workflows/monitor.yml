name: Uptime Monitor

on:
  schedule:
    - cron: "*/5 * * * *"    # every 5 minutes -- GitHub's practical floor (cron is
                             # throttled below ~5 min and may still be delayed under load)
  workflow_dispatch:          # manual "Run workflow" button
    inputs:
      test_ping:
        description: "Send a Telegram test message to verify delivery (token/chat id/bot admin)"
        type: boolean
        default: false
      send_digest:
        description: "Send the current-state digest to Telegram now (heartbeat on demand)"
        type: boolean
        default: false

permissions:
  contents: write             # needed to commit state.json back

concurrency:
  group: uptime-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          TEST_PING:          ${{ inputs.test_ping }}
          FORCE_DIGEST:       ${{ inputs.send_digest }}
        run: python monitor.py

      - name: Publish status data for GitHub Pages
        run: cp history.json docs/history.json   # Pages serves /docs as the site root

      - name: Persist state
        run: |
          git config user.name  "uptime-bot"
          git config user.email "uptime-bot@users.noreply.github.com"
          git add state.json history.json docs/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update monitor state [skip ci]"
          git push
